name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: TypeScript check
        run: npx tsc -b

      - name: Build Docker image
        run: docker build -t practice-exchange:ci .

      - name: Start container
        run: |
          docker run -d --name app -p 443:443 practice-exchange:ci
          # Wait for nginx to accept connections
          timeout 30 bash -c 'until curl -sk https://localhost > /dev/null 2>&1; do sleep 1; done'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test

      - name: Run Lighthouse CI
        run: |
          npm install -g @lhci/cli
          lhci autorun --config=lighthouserc.cjs

      - name: Stop container
        if: always()
        run: docker stop app && docker rm app

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: .lighthouseci/
          retention-days: 14
